name: Basic Checks

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: '24'
                  cache: 'npm'

            - name: Install deps
              run: npm ci

            - name: Run tests
              run: npm test
