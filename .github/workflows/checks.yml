name: Basic Checks

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-latest # Uses the latest stable runner automatically
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22 # Recommended: Use the current LTS (v22) unless v24 is required
                  cache: 'npm'
                  check-latest: true

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test
